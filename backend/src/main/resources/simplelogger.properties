# SLF4J Simple Logger Configuration
# See: https://www.slf4j.org/api/org/slf4j/simple/SimpleLogger.html

# Default log level (trace, debug, info, warn, error)
org.slf4j.simpleLogger.defaultLogLevel=info

# Show date/time in log output
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show thread name
org.slf4j.simpleLogger.showThreadName=true

# Show abbreviated logger name
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.showShortLogName=true

# Log output destination (System.err by default)
# For file logging, use: org.slf4j.simpleLogger.logFile=logs/app.log
# Note: For production with file rotation, consider switching to Logback
org.slf4j.simpleLogger.logFile=System.out

# Per-logger level overrides
# Reduce noise from Javalin internals
org.slf4j.simpleLogger.log.io.javalin=info
org.slf4j.simpleLogger.log.org.eclipse.jetty=warn
org.slf4j.simpleLogger.log.com.zaxxer.hikari=info

# Application loggers
org.slf4j.simpleLogger.log.expensetracker=info
