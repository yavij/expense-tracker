version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-tracker-app
    ports:
      - "${APP_PORT:-7000}:7000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JDBC_URL: jdbc:mysql://mysql:3306/expensetracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: ${DB_USER:-expensetracker}
      DB_PASSWORD: ${DB_PASSWORD:-expensetracker_password}
      PORT: 7000
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-min-32-chars}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      GOLD_API_KEY: ${GOLD_API_KEY:-}
      METAL_PRICE_API_KEY: ${METAL_PRICE_API_KEY:-}
    networks:
      - expense-tracker-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  mysql:
    image: mysql:8.0
    container_name: expense-tracker-db
    ports:
      - "${MYSQL_PORT:-127.0.0.1:3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
      MYSQL_USER: ${DB_USER:-expensetracker}
      MYSQL_PASSWORD: ${DB_PASSWORD:-expensetracker_password}
      MYSQL_DATABASE: expensetracker
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - expense-tracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

networks:
  expense-tracker-network:
    driver: bridge
